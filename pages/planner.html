    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">Oluwadara Bolaji</div>

    <!-- Page Header -->
    <section class="page-header">
        <h1>Academic Planner</h1>
    </section>

    <!-- Planner Section -->
    <section class="planner-section">
        <div class="planner-container">
            <!-- Planner header with task count -->
            <div class="planner-header">
                <h2>My Tasks</h2>
                <span class="task-count" id="task-count">0 tasks</span>
            </div>

            <!-- Add task form -->
            <form class="add-task-form" id="add-task-form">
                <input type="text" id="task-input" placeholder="Enter a new task..." required>
                <input type="date" id="task-date">
                <select id="task-priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button type="submit" class="add-task-btn">Add Task</button>
            </form>

            <!-- Filter buttons -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Task list -->
            <ul class="task-list" id="task-list">
                <li class="empty-message" id="empty-message">No tasks yet. Add your first task above!</li>
            </ul>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
